name: Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "发布版本号，例如 v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/tg_back
      DATABASE_URL_DIRECT: postgresql://postgres:postgres@127.0.0.1:5432/tg_back
      DATABASE_URL_LISTEN: postgresql://postgres:postgres@127.0.0.1:5432/tg_back
      ENCRYPTION_SECRET: build-only-secret
      TELEGRAM_API_ID: "1"
      TELEGRAM_API_HASH: build-only-hash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Resolve Release Metadata
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
            RELEASE_KIND="stable"
            RELEASE_NAME="tgback"
            PACKAGE_PREFIX="tgback"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            RELEASE_KIND="stable"
            RELEASE_NAME="tgback"
            PACKAGE_PREFIX="tgback"
          else
            SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
            BUILD_TIME="$(date -u +%Y%m%d-%H%M%S)"
            TAG="dev-${BUILD_TIME}-${SHORT_SHA}"
            RELEASE_KIND="prerelease"
            RELEASE_NAME="测试版 ${BUILD_TIME}-${SHORT_SHA}"
            PACKAGE_PREFIX="tgback"
          fi

          if [ "${RELEASE_KIND}" = "stable" ]; then
            case "${TAG}" in
              v*)
                ;;
              *)
                echo "release tag must start with v, got: ${TAG}" >&2
                exit 1
                ;;
            esac
          fi

          NODE_VERSION="$(node -p "process.version.slice(1)")"

          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_KIND=${RELEASE_KIND}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"
          echo "PACKAGE_PREFIX=${PACKAGE_PREFIX}" >> "$GITHUB_ENV"
          echo "BUNDLED_NODE_VERSION=${NODE_VERSION}" >> "$GITHUB_ENV"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build Web (Next.js standalone)
        run: pnpm -C apps/web build

      - name: Build Mirror Service (esbuild)
        run: pnpm -C apps/mirror-service build

      - name: Package release artifact
        run: |
          TAG="${RELEASE_TAG}"
          RELEASE_DIR="${PACKAGE_PREFIX}-${TAG}-linux-x64"
          NODE_DIST="node-v${BUNDLED_NODE_VERSION}-linux-x64"
          mkdir -p "${RELEASE_DIR}"

          # -- Bundled Node.js runtime (Linux x64) --
          mkdir -p "${RELEASE_DIR}/runtime"
          curl -fsSL "https://nodejs.org/dist/v${BUNDLED_NODE_VERSION}/${NODE_DIST}.tar.xz" -o "${NODE_DIST}.tar.xz"
          tar -xJf "${NODE_DIST}.tar.xz" -C "${RELEASE_DIR}/runtime"
          mv "${RELEASE_DIR}/runtime/${NODE_DIST}" "${RELEASE_DIR}/runtime/node"
          rm -f "${NODE_DIST}.tar.xz"

          # -- Web: standalone output --
          cp -r apps/web/.next/standalone "${RELEASE_DIR}/web"
          # static assets are not included in standalone, copy them
          cp -r apps/web/.next/static "${RELEASE_DIR}/web/apps/web/.next/static"
          # public folder (if exists)
          if [ -d apps/web/public ]; then
            cp -r apps/web/public "${RELEASE_DIR}/web/apps/web/public"
          fi

          # -- Mirror Service: bundled JS --
          mkdir -p "${RELEASE_DIR}/mirror-service"
          cp apps/mirror-service/dist/index.js "${RELEASE_DIR}/mirror-service/index.js"

          # -- DB migrations --
          mkdir -p "${RELEASE_DIR}/db"
          cp -r packages/db/drizzle "${RELEASE_DIR}/db/drizzle"
          cp packages/db/drizzle.config.cjs "${RELEASE_DIR}/db/drizzle.config.cjs"
          cp packages/db/package.json "${RELEASE_DIR}/db/package.json"

          # -- Config & scripts --
          cp .env.example "${RELEASE_DIR}/.env.example"

          # -- Start scripts --
          cat > "${RELEASE_DIR}/start-web.sh" << 'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          NODE_BIN="${SCRIPT_DIR}/runtime/node/bin/node"
          if [ ! -x "${NODE_BIN}" ]; then
            NODE_BIN="node"
          fi
          cd "${SCRIPT_DIR}/web/apps/web"
          export NODE_ENV=production
          exec "${NODE_BIN}" server.js
          SCRIPT
          chmod +x "${RELEASE_DIR}/start-web.sh"

          cat > "${RELEASE_DIR}/start-mirror.sh" << 'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          NODE_BIN="${SCRIPT_DIR}/runtime/node/bin/node"
          if [ ! -x "${NODE_BIN}" ]; then
            NODE_BIN="node"
          fi
          cd "${SCRIPT_DIR}"
          export NODE_ENV=production
          exec "${NODE_BIN}" mirror-service/index.js
          SCRIPT
          chmod +x "${RELEASE_DIR}/start-mirror.sh"

          cat > "${RELEASE_DIR}/start-all.sh" << 'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

          cleanup() { kill 0; wait; }
          trap cleanup SIGINT SIGTERM

          "${SCRIPT_DIR}/start-web.sh" &
          "${SCRIPT_DIR}/start-mirror.sh" &
          wait
          SCRIPT
          chmod +x "${RELEASE_DIR}/start-all.sh"

          cat > "${RELEASE_DIR}/migrate.sh" << 'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          NPX_BIN="${SCRIPT_DIR}/runtime/node/bin/npx"
          if [ ! -x "${NPX_BIN}" ]; then
            NPX_BIN="npx"
          fi
          cd "${SCRIPT_DIR}/db"
          exec "${NPX_BIN}" --yes drizzle-kit@0.31.4 migrate --config drizzle.config.cjs
          SCRIPT
          chmod +x "${RELEASE_DIR}/migrate.sh"

          cat > "${RELEASE_DIR}/README-release.md" << 'SCRIPT'
          # tg-back 发布包（Linux x64）

          这个压缩包已经包含：
          - Web 管理界面
          - mirror-service
          - 数据库迁移文件
          - Linux x64 的 Node.js 运行时

          使用步骤：

          1. 解压：
             tar -xzf tg-back-<版本>-linux-x64.tar.gz
          2. 进入目录并配置环境变量：
             cp .env.example .env
          3. 执行数据库迁移：
             ./migrate.sh
          4. 启动服务：
             ./start-all.sh

          如果你只想单独启动某一个进程，也可以分别运行：
          - ./start-web.sh
          - ./start-mirror.sh
          SCRIPT

          # -- Create tarball --
          tar -czf "${RELEASE_DIR}.tar.gz" "${RELEASE_DIR}"
          echo "RELEASE_DIR=${RELEASE_DIR}" >> "$GITHUB_ENV"

      - name: Create GitHub Pre-release
        if: env.RELEASE_KIND == 'prerelease'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            这是 main 分支自动生成的测试版发布包。

            - 分支：`${{ github.ref_name }}`
            - 提交：`${{ github.sha }}`
          files: ${{ env.RELEASE_DIR }}.tar.gz
          prerelease: true
          generate_release_notes: true

      - name: Create GitHub Release
        if: env.RELEASE_KIND == 'stable'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_NAME }}
          files: ${{ env.RELEASE_DIR }}.tar.gz
          generate_release_notes: true
